name: Release

# Runner selection order (first non-empty wins):
# 1. workflow_dispatch input "runner" (per-run override)
# 2. repository variable BUILD_RUNNER
# 3. fallback to "macos"
#
# Build and release stay on the same runner target.
# We never build on macOS and push on linux, or the other way around.
#
# BUILD_RUNNER accepts: "macos" | "linux"
# BUILD_RUNNER_MACOS_LABELS / BUILD_RUNNER_LINUX_LABELS accept either:
# - JSON arrays, e.g. ["self-hosted","macOS","X64"]
# - single label strings, e.g. ubuntu-latest
# - comma-separated labels, e.g. self-hosted,macOS,X64

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.0.0)'
        required: true
        type: string
      simple_release:
        description: 'Simple release: only x86_64 container images, skip other artifacts'
        required: false
        type: boolean
        default: false
      runner:
        description: 'Runner target (blank = use BUILD_RUNNER var; default macos)'
        required: false
        type: choice
        options:
          - ''
          - macos
          - linux
        default: ''

# 环境变量：合并 workflow_dispatch 输入和 repository variable
# tag push 触发时读取 vars.SIMPLE_RELEASE，workflow_dispatch 时使用输入参数
env:
  SIMPLE_RELEASE: ${{ github.event.inputs.simple_release == 'true' || vars.SIMPLE_RELEASE == 'true' }}
  NEXUS_URL: ${{ vars.NEXUS_URL || secrets.NEXUS_URL }}
  NEXUS_REPOSITORY: ${{ vars.NEXUS_REPOSITORY || secrets.NEXUS_REPOSITORY }}
  NEXUS_ARTIFACT_PREFIX: ${{ vars.NEXUS_ARTIFACT_PREFIX || secrets.NEXUS_ARTIFACT_PREFIX }}
  NEXUS_USERNAME: ${{ vars.NEXUS_USERNAME || secrets.NEXUS_USERNAME }}
  NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD || vars.NEXUS_PASSWORD }}

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  init:
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.runner.outputs.runner }}
      runs_on: ${{ steps.runner.outputs.runs_on }}
      storage_backend: ${{ steps.storage.outputs.storage_backend }}
      nexus_version_url: ${{ steps.storage.outputs.nexus_version_url }}
      nexus_frontend_url: ${{ steps.storage.outputs.nexus_frontend_url }}
      image_name: ${{ steps.meta.outputs.image_name }}
      ghcr_registry: ${{ steps.meta.outputs.ghcr_registry }}
      ghcr_repository: ${{ steps.meta.outputs.ghcr_repository }}
      ghcr_username: ${{ steps.meta.outputs.ghcr_username }}
      dockerhub_repository: ${{ steps.meta.outputs.dockerhub_repository }}
      dockerhub_username: ${{ steps.meta.outputs.dockerhub_username }}
      release_ref: ${{ steps.release.outputs.release_ref }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      release_version: ${{ steps.release.outputs.release_version }}
    steps:
      - name: Resolve runner
        id: runner
        shell: bash
        env:
          INPUT_RUNNER: ${{ inputs.runner }}
          VAR_RUNNER: ${{ vars.BUILD_RUNNER }}
          MACOS_LABELS: ${{ vars.BUILD_RUNNER_MACOS_LABELS }}
          LINUX_LABELS: ${{ vars.BUILD_RUNNER_LINUX_LABELS }}
        run: |
          set -euo pipefail

          to_json_runs_on() {
            local raw="$1"
            local fallback="$2"
            local trimmed=""

            if [ -z "$raw" ]; then
              printf '%s\n' "$fallback"
              return
            fi

            trimmed="$(printf '%s' "$raw" | xargs)"

            if [[ "$trimmed" == \[* ]] || [[ "$trimmed" == \"*\" ]]; then
              printf '%s\n' "$trimmed"
              return
            fi

            if [[ "$trimmed" != *,* ]]; then
              printf '"%s"\n' "${trimmed//\"/\\\"}"
              return
            fi

            local json="["
            local first=1
            IFS=',' read -r -a parts <<< "$trimmed"
            for part in "${parts[@]}"; do
              part="$(echo "$part" | xargs)"
              if [ -z "$part" ]; then
                continue
              fi
              if [ "$first" -eq 0 ]; then
                json+=","
              fi
              json+="\"${part//\"/\\\"}\""
              first=0
            done

            if [ "$first" -eq 1 ]; then
              printf '%s\n' "$fallback"
              return
            fi

            json+="]"
            printf '%s\n' "$json"
          }

          RUNNER="${INPUT_RUNNER}"
          if [ -z "$RUNNER" ]; then
            RUNNER="${VAR_RUNNER}"
          fi
          if [ "$RUNNER" != "macos" ] && [ "$RUNNER" != "linux" ]; then
            RUNNER="macos"
          fi

          if [ "$RUNNER" = "macos" ]; then
            LABELS="$(to_json_runs_on "${MACOS_LABELS}" '["self-hosted","macOS","X64"]')"
          else
            LABELS="$(to_json_runs_on "${LINUX_LABELS}" '"ubuntu-latest"')"
          fi

          echo "runner=${RUNNER}" >> "$GITHUB_OUTPUT"
          echo "runs_on=${LABELS}" >> "$GITHUB_OUTPUT"

      - name: Resolve release context
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG_NAME="${INPUT_TAG}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi

          TAG_NAME="${TAG_NAME#refs/tags/}"
          if [ -z "${TAG_NAME}" ]; then
            echo "Release tag is required"
            exit 1
          fi

          RELEASE_REF="${TAG_NAME}"
          RELEASE_VERSION="${TAG_NAME#v}"

          echo "release_ref=${RELEASE_REF}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Checkout release sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: ${{ steps.release.outputs.release_ref }}

      - name: Resolve stage storage
        id: storage
        shell: bash
        run: |
          set -euo pipefail

          trim_single_line() {
            printf '%s' "$1" | tr -d '\r\n'
          }

          STORAGE_BACKEND="github-artifact"
          VERSION_URL=""
          FRONTEND_URL=""
          NEXUS_URL_CLEAN="$(trim_single_line "${NEXUS_URL:-}")"
          NEXUS_REPOSITORY_CLEAN="$(trim_single_line "${NEXUS_REPOSITORY:-}")"
          NEXUS_USERNAME_CLEAN="$(trim_single_line "${NEXUS_USERNAME:-}")"
          NEXUS_PASSWORD_CLEAN="$(trim_single_line "${NEXUS_PASSWORD:-}")"
          NEXUS_ARTIFACT_PREFIX_CLEAN="$(trim_single_line "${NEXUS_ARTIFACT_PREFIX:-}")"

          if [ -n "${NEXUS_URL_CLEAN}" ] && [ -n "${NEXUS_REPOSITORY_CLEAN}" ] && [ -n "${NEXUS_USERNAME_CLEAN}" ] && [ -n "${NEXUS_PASSWORD_CLEAN}" ]; then
            STORAGE_BACKEND="nexus"

            if [ -n "${NEXUS_ARTIFACT_PREFIX_CLEAN}" ]; then
              PREFIX="${NEXUS_ARTIFACT_PREFIX_CLEAN}"
            else
              REPO_PATH="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
              PREFIX="infra/${REPO_PATH}/release"
            fi

            PREFIX="${PREFIX%/}/${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}"
            BASE_URL="${NEXUS_URL_CLEAN%/}/repository/${NEXUS_REPOSITORY_CLEAN}/${PREFIX}"
            VERSION_URL="${BASE_URL}/version-file.tar.gz"
            FRONTEND_URL="${BASE_URL}/frontend-dist.tar.gz"
          fi

          {
            echo "storage_backend=${STORAGE_BACKEND}"
            echo "nexus_version_url<<EOF"
            printf '%s\n' "${VERSION_URL}"
            echo "EOF"
            echo "nexus_frontend_url<<EOF"
            printf '%s\n' "${FRONTEND_URL}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve image metadata
        id: meta
        shell: bash
        env:
          RAW_IMAGE_NAME: ${{ vars.IMAGE_NAME || secrets.IMAGE_NAME }}
          DEFAULT_IMAGE_NAME: ${{ github.event.repository.name }}
          RAW_GHCR_IMAGE: ${{ vars.GHCR_IMAGE || secrets.GHCR_IMAGE }}
          RAW_GHCR_NAMESPACE: ${{ vars.GHCR_NAMESPACE || secrets.GHCR_NAMESPACE }}
          DEFAULT_GHCR_NAMESPACE: ${{ github.repository_owner }}
          RAW_GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || vars.GHCR_USERNAME }}
          DEFAULT_GHCR_USERNAME: ${{ github.repository_owner }}
          RAW_DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE || secrets.DOCKERHUB_IMAGE }}
          RAW_DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_NAMESPACE }}
          RAW_DOCKERHUB_ENABLED: ${{ vars.DOCKERHUB_ENABLED || secrets.DOCKERHUB_ENABLED }}
          RAW_DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || vars.DOCKERHUB_USERNAME }}
          RAW_DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN || vars.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          lower() {
            echo "$1" | tr '[:upper:]' '[:lower:]'
          }

          IMAGE_NAME="${RAW_IMAGE_NAME:-$DEFAULT_IMAGE_NAME}"
          IMAGE_NAME="$(lower "$IMAGE_NAME")"

          GHCR_USERNAME="${RAW_GHCR_USERNAME:-$DEFAULT_GHCR_USERNAME}"
          if [ -n "${RAW_GHCR_IMAGE:-}" ]; then
            GHCR_REPOSITORY="$(lower "$RAW_GHCR_IMAGE")"
            case "$GHCR_REPOSITORY" in
              ghcr.io/*) ;;
              *) GHCR_REPOSITORY="ghcr.io/${GHCR_REPOSITORY}" ;;
            esac
          else
            GHCR_NAMESPACE="${RAW_GHCR_NAMESPACE:-$DEFAULT_GHCR_NAMESPACE}"
            GHCR_NAMESPACE="$(lower "$GHCR_NAMESPACE")"
            GHCR_REPOSITORY="ghcr.io/${GHCR_NAMESPACE}/${IMAGE_NAME}"
          fi
          GHCR_REGISTRY="${GHCR_REPOSITORY%%/*}"

          DOCKERHUB_ENABLED="$(lower "${RAW_DOCKERHUB_ENABLED:-false}")"
          DOCKERHUB_USERNAME="${RAW_DOCKERHUB_USERNAME:-}"
          if [ "${DOCKERHUB_ENABLED}" != "true" ]; then
            echo "DockerHub publish disabled; skip DockerHub publish."
            DOCKERHUB_REPOSITORY="skip"
          else
            if [ -n "${RAW_DOCKERHUB_IMAGE:-}" ]; then
              DOCKERHUB_REPOSITORY="${RAW_DOCKERHUB_IMAGE#docker.io/}"
              DOCKERHUB_REPOSITORY="$(lower "$DOCKERHUB_REPOSITORY")"
            else
              DOCKERHUB_NAMESPACE="${RAW_DOCKERHUB_NAMESPACE:-$DOCKERHUB_USERNAME}"
              if [ -n "$DOCKERHUB_NAMESPACE" ]; then
                DOCKERHUB_NAMESPACE="$(lower "$DOCKERHUB_NAMESPACE")"
                DOCKERHUB_REPOSITORY="${DOCKERHUB_NAMESPACE}/${IMAGE_NAME}"
              else
                DOCKERHUB_REPOSITORY="skip"
              fi
            fi

            if [ "$DOCKERHUB_REPOSITORY" != "skip" ] && { [ -z "$DOCKERHUB_USERNAME" ] || [ -z "${RAW_DOCKERHUB_TOKEN:-}" ]; }; then
              echo "DockerHub credentials incomplete; skip DockerHub publish."
              DOCKERHUB_REPOSITORY="skip"
            fi
          fi

          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "ghcr_registry=${GHCR_REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "ghcr_repository=${GHCR_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "ghcr_username=${GHCR_USERNAME}" >> "$GITHUB_OUTPUT"
          echo "dockerhub_repository=${DOCKERHUB_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "dockerhub_username=${DOCKERHUB_USERNAME}" >> "$GITHUB_OUTPUT"

      - name: Validate DockerHub credentials
        if: ${{ steps.meta.outputs.dockerhub_repository != 'skip' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ steps.meta.outputs.dockerhub_username }}
          password: ${{ secrets.DOCKERHUB_TOKEN || vars.DOCKERHUB_TOKEN }}

      - name: Validate GitHub Container Registry credentials
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.meta.outputs.ghcr_registry }}
          username: ${{ steps.meta.outputs.ghcr_username }}
          password: ${{ secrets.GHCR_TOKEN || vars.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Validate DockerHub description update
        if: ${{ env.SIMPLE_RELEASE != 'true' && steps.meta.outputs.dockerhub_repository != 'skip' && vars.DOCKERHUB_UPDATE_DESCRIPTION != 'false' }}
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ steps.meta.outputs.dockerhub_username }}
          password: ${{ secrets.DOCKERHUB_TOKEN || vars.DOCKERHUB_TOKEN }}
          repository: ${{ steps.meta.outputs.dockerhub_repository }}
          short-description: "Sub2API - AI API Gateway Platform"
          readme-filepath: ./deploy/DOCKER.md

  # Update VERSION file with tag version
  update_version:
    needs: [init]
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ${{ fromJSON(needs.init.outputs.runs_on) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.init.outputs.release_ref }}

      - name: Update VERSION file
        env:
          RELEASE_VERSION: ${{ needs.init.outputs.release_version }}
        run: |
          printf '%s\n' "${RELEASE_VERSION}" > backend/cmd/server/VERSION
          echo "Updated VERSION file to: ${RELEASE_VERSION}"

      - name: Pack VERSION artifact
        run: |
          tar -czf version-file.tar.gz -C backend/cmd/server VERSION

      - name: Upload VERSION to Nexus
        if: ${{ needs.init.outputs.storage_backend == 'nexus' }}
        shell: bash
        env:
          NEXUS_UPLOAD_URL: ${{ needs.init.outputs.nexus_version_url }}
        run: |
          set -euo pipefail
          curl -fS --retry 3 --retry-all-errors \
            -u "${NEXUS_USERNAME}:${NEXUS_PASSWORD}" \
            --upload-file version-file.tar.gz \
            "${NEXUS_UPLOAD_URL}"

      - name: Upload VERSION artifact
        if: ${{ needs.init.outputs.storage_backend != 'nexus' }}
        uses: actions/upload-artifact@v7
        with:
          name: version-file
          path: version-file.tar.gz
          retention-days: 1

  build_macos:
    if: ${{ (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')) && needs.init.outputs.runner == 'macos' }}
    needs: [init]
    runs-on: ${{ fromJSON(needs.init.outputs.runs_on) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.init.outputs.release_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm run build
        working-directory: frontend

      - name: Pack frontend artifact
        run: |
          tar -czf frontend-dist.tar.gz -C backend/internal/web dist

      - name: Upload frontend to Nexus
        if: ${{ needs.init.outputs.storage_backend == 'nexus' }}
        shell: bash
        env:
          NEXUS_UPLOAD_URL: ${{ needs.init.outputs.nexus_frontend_url }}
        run: |
          set -euo pipefail
          curl -fS --retry 3 --retry-all-errors \
            -u "${NEXUS_USERNAME}:${NEXUS_PASSWORD}" \
            --upload-file frontend-dist.tar.gz \
            "${NEXUS_UPLOAD_URL}"

      - name: Upload frontend artifact
        if: ${{ needs.init.outputs.storage_backend != 'nexus' }}
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend-dist.tar.gz
          retention-days: 1

  build_linux:
    if: ${{ (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')) && needs.init.outputs.runner == 'linux' }}
    needs: [init]
    runs-on: ${{ fromJSON(needs.init.outputs.runs_on) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.init.outputs.release_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm run build
        working-directory: frontend

      - name: Pack frontend artifact
        run: |
          tar -czf frontend-dist.tar.gz -C backend/internal/web dist

      - name: Upload frontend to Nexus
        if: ${{ needs.init.outputs.storage_backend == 'nexus' }}
        shell: bash
        env:
          NEXUS_UPLOAD_URL: ${{ needs.init.outputs.nexus_frontend_url }}
        run: |
          set -euo pipefail
          curl -fS --retry 3 --retry-all-errors \
            -u "${NEXUS_USERNAME}:${NEXUS_PASSWORD}" \
            --upload-file frontend-dist.tar.gz \
            "${NEXUS_UPLOAD_URL}"

      - name: Upload frontend artifact
        if: ${{ needs.init.outputs.storage_backend != 'nexus' }}
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend-dist.tar.gz
          retention-days: 1

  release_macos:
    if: ${{ (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')) && needs.init.outputs.runner == 'macos' }}
    needs: [init, update_version, build_macos]
    runs-on: ${{ fromJSON(needs.init.outputs.runs_on) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.init.outputs.release_ref }}

      - name: Create artifact workspace
        run: mkdir -p .release-artifacts

      - name: Download VERSION from Nexus
        if: ${{ needs.init.outputs.storage_backend == 'nexus' }}
        shell: bash
        env:
          NEXUS_DOWNLOAD_URL: ${{ needs.init.outputs.nexus_version_url }}
        run: |
          set -euo pipefail
          curl -fS --retry 3 --retry-all-errors \
            -u "${NEXUS_USERNAME}:${NEXUS_PASSWORD}" \
            -o .release-artifacts/version-file.tar.gz \
            "${NEXUS_DOWNLOAD_URL}"

      - name: Download VERSION artifact
        if: ${{ needs.init.outputs.storage_backend != 'nexus' }}
        uses: actions/download-artifact@v8
        with:
          name: version-file
          path: .release-artifacts

      - name: Download frontend from Nexus
        if: ${{ needs.init.outputs.storage_backend == 'nexus' }}
        shell: bash
        env:
          NEXUS_DOWNLOAD_URL: ${{ needs.init.outputs.nexus_frontend_url }}
        run: |
          set -euo pipefail
          curl -fS --retry 3 --retry-all-errors \
            -u "${NEXUS_USERNAME}:${NEXUS_PASSWORD}" \
            -o .release-artifacts/frontend-dist.tar.gz \
            "${NEXUS_DOWNLOAD_URL}"

      - name: Download frontend artifact
        if: ${{ needs.init.outputs.storage_backend != 'nexus' }}
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: .release-artifacts

      - name: Extract staged artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p backend/cmd/server backend/internal/web
          rm -rf backend/internal/web/dist
          tar -xzf .release-artifacts/version-file.tar.gz -C backend/cmd/server
          tar -xzf .release-artifacts/frontend-dist.tar.gz -C backend/internal/web

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          # Self-hosted release runners keep a persistent module cache.
          # Restoring setup-go's tar cache over read-only pkg/mod files can fail
          # with "Can't unlink already-existing object: Permission denied".
          cache: false

      - name: Pin setup-go toolchain
        shell: bash
        run: |
          set -euo pipefail
          unset GOENV_VERSION || true
          unset GOROOT || true
          hash -r

          TOOLCACHE_GO="$(which -a go | grep '/_work/_tool/go/' | head -n1 || true)"
          if [ -z "${TOOLCACHE_GO}" ]; then
            echo "Unable to find setup-go toolchain in PATH"
            which -a go || true
            exit 1
          fi

          GO_ROOT="$(cd "$(dirname "${TOOLCACHE_GO}")/.." && pwd)"
          echo "${GO_ROOT}/bin" >> "${GITHUB_PATH}"
          {
            echo "GOROOT=${GO_ROOT}"
            echo "GOENV_VERSION="
            echo "GOTOOLCHAIN=auto"
          } >> "${GITHUB_ENV}"

          echo "Pinned Go toolchain: ${TOOLCACHE_GO}"

      - name: Verify Go toolchain
        shell: bash
        run: |
          set -euo pipefail
          # Self-hosted runners may export stale goenv values that shadow setup-go.
          unset GOENV_VERSION || true
          unset GOROOT || true
          export GOTOOLCHAIN=auto
          hash -r
          which -a go
          go version
          go env GOROOT GOTOOLCHAIN
          go version | grep -q 'go1.26.2'

      - name: Verify Docker on macOS runner
        shell: bash
        run: |
          set -euo pipefail
          if ! docker info >/dev/null 2>&1; then
            echo "Docker Desktop is not running on this macOS runner."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: ${{ needs.init.outputs.dockerhub_repository != 'skip' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ needs.init.outputs.dockerhub_username }}
          password: ${{ secrets.DOCKERHUB_TOKEN || vars.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ needs.init.outputs.ghcr_registry }}
          username: ${{ needs.init.outputs.ghcr_username }}
          password: ${{ secrets.GHCR_TOKEN || vars.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Fetch tags with annotations
        run: |
          # 确保获取完整的 annotated tag 信息
          git fetch --tags --force

      - name: Get tag message
        id: tag_message
        run: |
          TAG_NAME='${{ needs.init.outputs.release_tag }}'
          echo "Processing tag: $TAG_NAME"

          # 获取完整的 tag message（跳过第一行标题）
          TAG_MESSAGE=$(git tag -l --format='%(contents:body)' "$TAG_NAME")

          # 调试输出
          echo "Tag message length: ${#TAG_MESSAGE}"
          echo "Tag message preview:"
          echo "$TAG_MESSAGE" | head -10

          # 使用 EOF 分隔符处理多行内容
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$TAG_MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean --skip=validate ${{ env.SIMPLE_RELEASE == 'true' && '--config=.goreleaser.simple.yaml' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_MESSAGE: ${{ steps.tag_message.outputs.message }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          IMAGE_NAME: ${{ needs.init.outputs.image_name }}
          GHCR_REPOSITORY: ${{ needs.init.outputs.ghcr_repository }}
          DOCKERHUB_REPOSITORY: ${{ needs.init.outputs.dockerhub_repository }}

      # Send Telegram notification
      - name: Send Telegram Notification
        if: ${{ env.SIMPLE_RELEASE != 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DOCKERHUB_REPOSITORY: ${{ needs.init.outputs.dockerhub_repository }}
          GHCR_REPOSITORY: ${{ needs.init.outputs.ghcr_repository }}
          IMAGE_NAME: ${{ needs.init.outputs.image_name }}
        continue-on-error: true
        run: |
          # 检查必要的环境变量
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram credentials not configured, skipping notification"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME=${{ github.event.inputs.tag }}
          else
            TAG_NAME=${GITHUB_REF#refs/tags/}
          fi
          VERSION=${TAG_NAME#v}
          REPO="${{ github.repository }}"
          GHCR_IMAGE="${GHCR_REPOSITORY}"

          # 获取 tag message 内容并转义 Markdown 特殊字符
          TAG_MESSAGE='${{ steps.tag_message.outputs.message }}'
          TAG_MESSAGE=$(echo "$TAG_MESSAGE" | sed 's/\([_*`\[]\)/\\\1/g')

          # 限制消息长度（Telegram 消息限制 4096 字符，预留空间给头尾固定内容）
          if [ ${#TAG_MESSAGE} -gt 3500 ]; then
            TAG_MESSAGE="${TAG_MESSAGE:0:3500}..."
          fi

          # 构建消息内容
          MESSAGE="🚀 *Sub2API 新版本发布！*"$'\n'$'\n'
          MESSAGE+="📦 版本号: \`${VERSION}\`"$'\n'$'\n'

          # 添加更新内容
          if [ -n "$TAG_MESSAGE" ]; then
            MESSAGE+="${TAG_MESSAGE}"$'\n'$'\n'
          fi

          MESSAGE+="🐳 *Docker 部署:*"$'\n'
          MESSAGE+="\`\`\`bash"$'\n'
          # 根据是否配置 DockerHub 动态生成
          if [ "$DOCKERHUB_REPOSITORY" != "skip" ]; then
            DOCKER_IMAGE="${DOCKERHUB_REPOSITORY}"
            MESSAGE+="# Docker Hub"$'\n'
            MESSAGE+="docker pull ${DOCKER_IMAGE}:${VERSION}"$'\n'
            MESSAGE+="# GitHub Container Registry"$'\n'
          fi
          MESSAGE+="docker pull ${GHCR_IMAGE}:${VERSION}"$'\n'
          MESSAGE+="\`\`\`"$'\n'$'\n'
          MESSAGE+="🔗 *相关链接:*"$'\n'
          MESSAGE+="• [GitHub Release](https://github.com/${REPO}/releases/tag/${TAG_NAME})"$'\n'
          if [ "$DOCKERHUB_REPOSITORY" != "skip" ]; then
            MESSAGE+="• [Docker Hub](https://hub.docker.com/r/${DOCKER_IMAGE})"$'\n'
          fi
          MESSAGE+="• [GitHub Packages](https://github.com/${REPO}/pkgs/container/${IMAGE_NAME})"$'\n'$'\n'
          MESSAGE+="#Sub2API #Release #${TAG_NAME//./_}"

          # 发送消息
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg chat_id "${TELEGRAM_CHAT_ID}" \
              --arg text "${MESSAGE}" \
              '{
                chat_id: $chat_id,
                text: $text,
                parse_mode: "Markdown",
                disable_web_page_preview: true
              }')"

  release_linux:
    if: ${{ (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')) && needs.init.outputs.runner == 'linux' }}
    needs: [init, update_version, build_linux]
    runs-on: ${{ fromJSON(needs.init.outputs.runs_on) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.init.outputs.release_ref }}

      - name: Create artifact workspace
        run: mkdir -p .release-artifacts

      - name: Download VERSION from Nexus
        if: ${{ needs.init.outputs.storage_backend == 'nexus' }}
        shell: bash
        env:
          NEXUS_DOWNLOAD_URL: ${{ needs.init.outputs.nexus_version_url }}
        run: |
          set -euo pipefail
          curl -fS --retry 3 --retry-all-errors \
            -u "${NEXUS_USERNAME}:${NEXUS_PASSWORD}" \
            -o .release-artifacts/version-file.tar.gz \
            "${NEXUS_DOWNLOAD_URL}"

      - name: Download VERSION artifact
        if: ${{ needs.init.outputs.storage_backend != 'nexus' }}
        uses: actions/download-artifact@v8
        with:
          name: version-file
          path: .release-artifacts

      - name: Download frontend from Nexus
        if: ${{ needs.init.outputs.storage_backend == 'nexus' }}
        shell: bash
        env:
          NEXUS_DOWNLOAD_URL: ${{ needs.init.outputs.nexus_frontend_url }}
        run: |
          set -euo pipefail
          curl -fS --retry 3 --retry-all-errors \
            -u "${NEXUS_USERNAME}:${NEXUS_PASSWORD}" \
            -o .release-artifacts/frontend-dist.tar.gz \
            "${NEXUS_DOWNLOAD_URL}"

      - name: Download frontend artifact
        if: ${{ needs.init.outputs.storage_backend != 'nexus' }}
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: .release-artifacts

      - name: Extract staged artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p backend/cmd/server backend/internal/web
          rm -rf backend/internal/web/dist
          tar -xzf .release-artifacts/version-file.tar.gz -C backend/cmd/server
          tar -xzf .release-artifacts/frontend-dist.tar.gz -C backend/internal/web

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          # Self-hosted release runners keep a persistent module cache.
          # Restoring setup-go's tar cache over read-only pkg/mod files can fail
          # with "Can't unlink already-existing object: Permission denied".
          cache: false

      - name: Pin setup-go toolchain
        shell: bash
        run: |
          set -euo pipefail
          unset GOENV_VERSION || true
          unset GOROOT || true
          hash -r

          TOOLCACHE_GO="$(which -a go | grep '/_work/_tool/go/' | head -n1 || true)"
          if [ -z "${TOOLCACHE_GO}" ]; then
            echo "Unable to find setup-go toolchain in PATH"
            which -a go || true
            exit 1
          fi

          GO_ROOT="$(cd "$(dirname "${TOOLCACHE_GO}")/.." && pwd)"
          echo "${GO_ROOT}/bin" >> "${GITHUB_PATH}"
          {
            echo "GOROOT=${GO_ROOT}"
            echo "GOENV_VERSION="
            echo "GOTOOLCHAIN=auto"
          } >> "${GITHUB_ENV}"

          echo "Pinned Go toolchain: ${TOOLCACHE_GO}"

      - name: Verify Go toolchain
        shell: bash
        run: |
          set -euo pipefail
          # Self-hosted runners may export stale goenv values that shadow setup-go.
          unset GOENV_VERSION || true
          unset GOROOT || true
          export GOTOOLCHAIN=auto
          hash -r
          which -a go
          go version
          go env GOROOT GOTOOLCHAIN
          go version | grep -q 'go1.26.2'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: ${{ needs.init.outputs.dockerhub_repository != 'skip' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ needs.init.outputs.dockerhub_username }}
          password: ${{ secrets.DOCKERHUB_TOKEN || vars.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ needs.init.outputs.ghcr_registry }}
          username: ${{ needs.init.outputs.ghcr_username }}
          password: ${{ secrets.GHCR_TOKEN || vars.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Fetch tags with annotations
        run: |
          # 确保获取完整的 annotated tag 信息
          git fetch --tags --force

      - name: Get tag message
        id: tag_message
        run: |
          TAG_NAME='${{ needs.init.outputs.release_tag }}'
          echo "Processing tag: $TAG_NAME"

          # 获取完整的 tag message（跳过第一行标题）
          TAG_MESSAGE=$(git tag -l --format='%(contents:body)' "$TAG_NAME")

          # 调试输出
          echo "Tag message length: ${#TAG_MESSAGE}"
          echo "Tag message preview:"
          echo "$TAG_MESSAGE" | head -10

          # 使用 EOF 分隔符处理多行内容
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$TAG_MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean --skip=validate ${{ env.SIMPLE_RELEASE == 'true' && '--config=.goreleaser.simple.yaml' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_MESSAGE: ${{ steps.tag_message.outputs.message }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          IMAGE_NAME: ${{ needs.init.outputs.image_name }}
          GHCR_REPOSITORY: ${{ needs.init.outputs.ghcr_repository }}
          DOCKERHUB_REPOSITORY: ${{ needs.init.outputs.dockerhub_repository }}

      - name: Send Telegram Notification
        if: ${{ env.SIMPLE_RELEASE != 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DOCKERHUB_REPOSITORY: ${{ needs.init.outputs.dockerhub_repository }}
          GHCR_REPOSITORY: ${{ needs.init.outputs.ghcr_repository }}
          IMAGE_NAME: ${{ needs.init.outputs.image_name }}
        continue-on-error: true
        run: |
          # 检查必要的环境变量
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram credentials not configured, skipping notification"
            exit 0
          fi

          TAG_NAME='${{ needs.init.outputs.release_tag }}'
          VERSION=${TAG_NAME#v}
          REPO="${{ github.repository }}"
          GHCR_IMAGE="${GHCR_REPOSITORY}"

          # 获取 tag message 内容并转义 Markdown 特殊字符
          TAG_MESSAGE='${{ steps.tag_message.outputs.message }}'
          TAG_MESSAGE=$(echo "$TAG_MESSAGE" | sed 's/\([_*`\[]\)/\\\1/g')

          # 限制消息长度（Telegram 消息限制 4096 字符，预留空间给头尾固定内容）
          if [ ${#TAG_MESSAGE} -gt 3500 ]; then
            TAG_MESSAGE="${TAG_MESSAGE:0:3500}..."
          fi

          # 构建消息内容
          MESSAGE="🚀 *Sub2API 新版本发布！*"$'\n'$'\n'
          MESSAGE+="📦 版本号: \`${VERSION}\`"$'\n'$'\n'

          # 添加更新内容
          if [ -n "$TAG_MESSAGE" ]; then
            MESSAGE+="${TAG_MESSAGE}"$'\n'$'\n'
          fi

          MESSAGE+="🐳 *Docker 部署:*"$'\n'
          MESSAGE+="\`\`\`bash"$'\n'
          # 根据是否配置 DockerHub 动态生成
          if [ "$DOCKERHUB_REPOSITORY" != "skip" ]; then
            DOCKER_IMAGE="${DOCKERHUB_REPOSITORY}"
            MESSAGE+="# Docker Hub"$'\n'
            MESSAGE+="docker pull ${DOCKER_IMAGE}:${TAG_NAME}"$'\n'
            MESSAGE+="# GitHub Container Registry"$'\n'
          fi
          MESSAGE+="docker pull ${GHCR_IMAGE}:${TAG_NAME}"$'\n'
          MESSAGE+="\`\`\`"$'\n'$'\n'
          MESSAGE+="🔗 *相关链接:*"$'\n'
          MESSAGE+="• [GitHub Release](https://github.com/${REPO}/releases/tag/${TAG_NAME})"$'\n'
          if [ "$DOCKERHUB_REPOSITORY" != "skip" ]; then
            MESSAGE+="• [Docker Hub](https://hub.docker.com/r/${DOCKER_IMAGE})"$'\n'
          fi
          MESSAGE+="• [GitHub Packages](https://github.com/${REPO}/pkgs/container/${IMAGE_NAME})"$'\n'$'\n'
          MESSAGE+="#Sub2API #Release #${TAG_NAME//./_}"

          # 发送消息
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg chat_id "${TELEGRAM_CHAT_ID}" \
              --arg text "${MESSAGE}" \
              '{
                chat_id: $chat_id,
                text: $text,
                parse_mode: "Markdown",
                disable_web_page_preview: true
              }')"

  sync_version_file:
    if: ${{ needs.release_macos.result == 'success' || needs.release_linux.result == 'success' }}
    needs: [init, release_macos, release_linux]
    runs-on: ${{ fromJSON(needs.init.outputs.runs_on) }}
    steps:
      - name: Checkout repository history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Resolve sync target branch
        id: sync_branch
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RELEASE_REF: ${{ needs.init.outputs.release_ref }}
          DISPATCH_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git fetch origin "${DEFAULT_BRANCH}" develop --no-tags || true

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TARGET_BRANCH="${DISPATCH_BRANCH}"
          else
            TAG_COMMIT="$(git rev-list -n1 "${RELEASE_REF}")"
            HAS_DEFAULT="false"
            HAS_DEVELOP="false"

            if git show-ref --verify --quiet "refs/remotes/origin/${DEFAULT_BRANCH}" && git merge-base --is-ancestor "${TAG_COMMIT}" "origin/${DEFAULT_BRANCH}"; then
              HAS_DEFAULT="true"
            fi

            if git show-ref --verify --quiet "refs/remotes/origin/develop" && git merge-base --is-ancestor "${TAG_COMMIT}" "origin/develop"; then
              HAS_DEVELOP="true"
            fi

            if [ "${HAS_DEFAULT}" = "true" ] && [ "${HAS_DEVELOP}" != "true" ]; then
              TARGET_BRANCH="${DEFAULT_BRANCH}"
            elif [ "${HAS_DEVELOP}" = "true" ] && [ "${HAS_DEFAULT}" != "true" ]; then
              TARGET_BRANCH="develop"
            else
              TARGET_BRANCH="${DEFAULT_BRANCH}"
            fi
          fi

          echo "target_branch=${TARGET_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "Sync VERSION file to branch: ${TARGET_BRANCH}"

      - name: Checkout sync target branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.sync_branch.outputs.target_branch }}

      - name: Sync VERSION file to released tag
        env:
          RELEASE_VERSION: ${{ needs.init.outputs.release_version }}
          TARGET_BRANCH: ${{ steps.sync_branch.outputs.target_branch }}
        run: |
          CURRENT_VERSION=$(tr -d '\r\n' < backend/cmd/server/VERSION || true)
          if [ "$CURRENT_VERSION" = "$RELEASE_VERSION" ]; then
            echo "VERSION file already matches ${RELEASE_VERSION}"
            exit 0
          fi

          printf '%s\n' "${RELEASE_VERSION}" > backend/cmd/server/VERSION

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/cmd/server/VERSION
          git commit -m "chore: sync VERSION to ${RELEASE_VERSION} [skip ci]"
          git push origin HEAD:${TARGET_BRANCH}
